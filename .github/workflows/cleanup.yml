name: Cleanup Old Images

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}

permissions:
  packages: write

jobs:
  cleanup:
    name: Remove Old Container Images
    runs-on: ubuntu-latest

    steps:
      - name: Delete old untagged images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ci-cd-tutorial-sample-app
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true

      - name: Summary
        run: |
          echo "========================================="
          echo "  Artifact Cleanup Complete"
          echo "  Kept: 10 most recent versions"
          echo "  Deleted: untagged images only"
          echo "  Semver-tagged images are preserved"
          echo "========================================="
