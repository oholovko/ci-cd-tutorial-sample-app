name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PYTHON_VERSION: "3.8"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run unit tests
        run: python -m unittest discover

  version:
    name: Semantic Version
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    outputs:
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      new_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/github

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --no-ci || true
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Latest tag: $LATEST_TAG"
          if [ -n "$LATEST_TAG" ]; then
            VERSION="${LATEST_TAG#v}"
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
            echo "new_release_version=" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build Docker Image
    needs: [test, version]
    if: always() && needs.test.result == 'success'
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.version.outputs.new_version }},enable=${{ needs.version.outputs.new_release == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy
    needs: [version, build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy versioned image
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "========================================="
          echo "  Deploying to production"
          echo "  Image   : ${IMAGE}"
          echo "  Version : ${VERSION:-N/A}"
          echo "  SHA Tag : ${{ github.sha }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "========================================="
          if [ -n "$VERSION" ]; then
            echo "Pulling ${IMAGE}:${VERSION}"
            echo "Deploying version ${VERSION}"
          else
            echo "Pulling ${IMAGE}:latest"
            echo "Deploying latest build"
          fi
          echo "Deployment completed successfully."

  notify:
    name: Slack Notification
    needs: [test, version, build, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Determine pipeline status
        id: status
        run: |
          if [[ "${{ needs.test.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" || \
                "${{ needs.deploy.result }}" == "failure" ]]; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.test.result }}" == "cancelled" || \
                  "${{ needs.build.result }}" == "cancelled" || \
                  "${{ needs.deploy.result }}" == "cancelled" ]]; then
            echo "result=cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack — Success
        if: steps.status.outputs.result == 'success'
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "✅ Pipeline Passed", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                    { "type": "mrkdwn", "text": "*Version:*\n${{ needs.version.outputs.new_version || 'N/A' }}" },
                    { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Commit:* `${{ github.sha }}`\n*Message:* ${{ github.event.head_commit.message }}" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Test:* ✅ Passed" },
                    { "type": "mrkdwn", "text": "*Build:* ✅ Passed" },
                    { "type": "mrkdwn", "text": "*Deploy:* ✅ Passed" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [{ "type": "button", "text": { "type": "plain_text", "text": "View Run" }, "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" }]
                }
              ]
            }

      - name: Notify Slack — Failure
        if: steps.status.outputs.result == 'failure'
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "❌ Pipeline Failed", "emoji": true }
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "<!here> Pipeline failed — immediate attention needed." }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                    { "type": "mrkdwn", "text": "*Version:*\n${{ needs.version.outputs.new_version || 'N/A' }}" },
                    { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Commit:* `${{ github.sha }}`\n*Message:* ${{ github.event.head_commit.message }}" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Test:* ${{ needs.test.result == 'success' && '✅' || '❌' }} ${{ needs.test.result }}" },
                    { "type": "mrkdwn", "text": "*Build:* ${{ needs.build.result == 'success' && '✅' || '❌' }} ${{ needs.build.result }}" },
                    { "type": "mrkdwn", "text": "*Deploy:* ${{ needs.deploy.result == 'success' && '✅' || (needs.deploy.result == 'skipped' && '⏭️' || '❌') }} ${{ needs.deploy.result }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [{ "type": "button", "text": { "type": "plain_text", "text": "🔍 View Logs" }, "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" }]
                }
              ]
            }

      - name: Notify Slack — Cancelled
        if: steps.status.outputs.result == 'cancelled'
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "⚠️ Pipeline Cancelled", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                    { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [{ "type": "button", "text": { "type": "plain_text", "text": "View Run" }, "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" }]
                }
              ]
            }
